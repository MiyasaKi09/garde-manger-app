name: Release production

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  validate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  migrate-and-deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      PGSSLMODE: require
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VERCEL_ORG_ID: team_MVt6BMtIICl0edY7H0YFiCaC
      VERCEL_PROJECT_ID: prj_uAqd9Tniy2CDeN2bAWCPYlgVCET0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Installer les dépendances et psql
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Configurer la connexion Supabase de production
        env:
          RAW_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          RAW_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          host="$RAW_HOST"
          host="${host#postgresql://}"
          host="${host#postgres://}"
          if [[ "$host" == *"@"* ]]; then
            host="${host#*@}"
          fi
          host="${host%%/*}"
          host="${host%%:*}"
          host="$(echo -n "$host" | tr -d '[:space:]')"
          ref="$(echo -n "$RAW_REF" | tr -d '[:space:]')"

          test -n "$host" || { echo "SUPABASE_POOLER_HOST est absent"; exit 1; }
          test -n "$ref" || { echo "SUPABASE_PROJECT_REF est absent"; exit 1; }
          test -n "$PGPASSWORD" || { echo "SUPABASE_DB_PASSWORD est absent"; exit 1; }

          select_connection() {
            local port="$1" user="$2" pg_options="$3"
            if [ -n "$pg_options" ]; then
              PGOPTIONS="$pg_options" psql \
                "host=$host port=$port dbname=postgres user=$user sslmode=require" \
                -Atc "select 1" >/dev/null 2>&1
            else
              psql "host=$host port=$port dbname=postgres user=$user sslmode=require" \
                -Atc "select 1" >/dev/null 2>&1
            fi
          }

          for candidate in \
            "6543|postgres.${ref}|" \
            "6543|postgres|project=${ref}" \
            "6544|postgres.${ref}|" \
            "6544|postgres|project=${ref}"
          do
            IFS='|' read -r port user pg_options <<< "$candidate"
            if select_connection "$port" "$user" "$pg_options"; then
              echo "DATABASE_URL=host=$host port=$port dbname=postgres user=$user sslmode=require" >> "$GITHUB_ENV"
              if [ -n "$pg_options" ]; then
                echo "PGOPTIONS=$pg_options" >> "$GITHUB_ENV"
              fi
              echo "Connexion Supabase validée sur le port $port"
              exit 0
            fi
          done

          echo "Aucune connexion Supabase de production n'a abouti"
          exit 1
      - name: Vérifier le manifeste de migrations
        run: |
          node scripts/db/build-manifest.mjs
          git diff --exit-code -- scripts/db/migration-manifest.json
      - name: Réconcilier le registre de migrations
        run: |
          bash scripts/db/reconcile-ledger.sh --dry-run
          bash scripts/db/reconcile-ledger.sh apply
      - name: Dry-run migrations production
        run: bash scripts/db/apply-migrations.sh status
      - name: Appliquer les migrations production
        run: bash scripts/db/apply-migrations.sh apply
      - name: Vérifier idempotence, contrat et invariants
        run: |
          output=$(bash scripts/db/apply-migrations.sh apply)
          echo "$output"
          echo "$output" | grep -E '^migrations : 0 appliquées'
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/ci/42_planning_final_demands.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/db/verify-planning-production.sql
      - name: Construire avec l’environnement Vercel de production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel@56.4.1 pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@56.4.1 build --prod --token="$VERCEL_TOKEN"
      - name: Déployer Vercel après validation du schéma
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url=$(npx --yes vercel@56.4.1 deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Déploiement : $deployment_url"
          curl --fail --location --retry 8 --retry-delay 5 "$deployment_url/"
      - name: Canary transactionnel Planning V5
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/canary/planning_v5_transaction_canary.sql
