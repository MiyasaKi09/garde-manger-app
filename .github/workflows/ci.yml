name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Stubs requis pour `next build` : .env.production est gitignoré et les
      # pages client partagent le client Supabase de lib/supabaseClient.js
      # (null sans ces variables lors du prerender).
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (non bloquant)
        run: npm run lint
        continue-on-error: true

      - name: Tests unitaires
        run: npx vitest run

      - name: Build Next.js
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Next.js
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
