name: Agent apply conditional complete meals

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/conditional-complete-meals'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d scripts/agent/conditional-complete-meals.patch.gz.b64 | gzip -d > /tmp/conditional-complete-meals.patch
          git apply --check /tmp/conditional-complete-meals.patch
          git apply /tmp/conditional-complete-meals.patch
          rm scripts/agent/conditional-complete-meals.patch.gz.b64
          rm .github/workflows/agent-apply-conditional-complete-meals.yml
      - name: Commit generated change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m 'feat(planning): compose complete personalized plates'
          git push origin HEAD:${{ github.head_ref }}
