name: Diagnose planning P4 once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: stub

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/planning-p4-support-slots
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply candidate changes in the runner
        shell: python
        run: |
          from pathlib import Path
          workflow = Path('.github/workflows/finalize-planning-p4-once.yml').read_text()
          section = workflow.split('- name: Harden support slots, link meals and add real preparation tasks', 1)[1]
          block = section.split('run: |\n', 1)[1].split('\n      - name: Regenerate migration manifest', 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(script, 'finalize-planning-p4-once.yml', 'exec'))
      - name: Capture complete Vitest result
        run: |
          npx vitest run --reporter=json --outputFile=/tmp/vitest-result.json || true
          test -s /tmp/vitest-result.json
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: planning-p4-vitest-diagnostic
          path: /tmp/vitest-result.json
          retention-days: 1
