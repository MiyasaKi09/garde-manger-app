name: Planning safety

on:
  pull_request:
    paths:
      - 'app/api/meals/cook/**'
      - 'lib/server/legacyMealCookRoute.js'
      - 'tests/planning/mealsCook*.test.js'
      - 'supabase/migrations/20260717000002_p2_planned_productions.sql'
      - 'supabase/migrations/includes/**'
      - 'scripts/db/build-manifest.mjs'
      - '.github/workflows/planning-safety.yml'
  push:
    branches:
      - 'claude/**'
    paths:
      - 'app/api/meals/cook/**'
      - 'lib/server/legacyMealCookRoute.js'
      - 'tests/planning/mealsCook*.test.js'
      - 'supabase/migrations/20260717000002_p2_planned_productions.sql'
      - 'supabase/migrations/includes/**'
      - 'scripts/db/build-manifest.mjs'
      - '.github/workflows/planning-safety.yml'

permissions:
  contents: write

jobs:
  prepared-source-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vérifier les plats préparés et la double déduction
        run: >-
          npx vitest run
          tests/planning/mealsCookExpiry.test.js
          tests/planning/mealsCookPreparedSource.test.js
          --reporter=verbose
      - name: Régénérer le manifeste composite des migrations
        run: node scripts/db/build-manifest.mjs
      - name: Vérifier ou publier le manifeste régénéré
        shell: bash
        run: |
          if git diff --quiet -- scripts/db/migration-manifest.json; then
            echo "Manifest déjà synchronisé."
            exit 0
          fi

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Le manifeste committé n'est pas synchronisé avec les migrations." >&2
            git diff -- scripts/db/migration-manifest.json
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/db/migration-manifest.json
          git commit -m "chore(db): regenerate migration manifest [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
