name: Commit final planning P4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: stub

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/planning-p4-support-slots
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply reviewed P4 changes
        shell: python
        run: |
          from pathlib import Path
          workflow = Path('.github/workflows/finalize-planning-p4-once.yml').read_text()
          section = workflow.split('- name: Harden support slots, link meals and add real preparation tasks', 1)[1]
          block = section.split('run: |\n', 1)[1].split('\n      - name: Regenerate migration manifest', 1)[0]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(script, 'finalize-planning-p4-once.yml', 'exec'))

          test = Path('tests/planning/plannedProductions.test.js')
          text = test.read_text()
          old = "const mealLines = payload.legacy_meals.filter((meal) => meal.slot_key)"
          new = "const mealLines = payload.legacy_meals.filter((meal) => ['dejeuner', 'diner'].includes(meal.meal_type))"
          if text.count(old) != 1:
              raise SystemExit('test K main-meal filter marker missing')
          test.write_text(text.replace(old, new, 1))
      - name: Regenerate manifest
        run: node scripts/db/build-manifest.mjs
      - name: Run 691 unit tests
        run: npx vitest run
      - name: Build application
        run: npm run build
      - name: Commit clean verified result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-planning-p4-once.yml
          rm -f .github/workflows/trigger-finalize-planning-p4.yml
          rm -f .github/workflows/diagnose-planning-p4-once.yml
          rm -f .github/workflows/commit-planning-p4-final.yml
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add -A
          git commit -m "fix(planning): sécuriser et rendre exécutables les prises support"
          git push origin HEAD:claude/planning-p4-support-slots
