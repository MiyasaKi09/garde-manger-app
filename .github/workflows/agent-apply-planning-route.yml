name: Agent apply planning route

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/planning-speed-objectives-diversity-modal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/planning-speed-objectives-diversity-modal
          fetch-depth: 0
      - name: Vérifier si la route est déjà corrigée
        id: state
        run: |
          if grep -q "selectPlanningRecipePool" app/api/planning/generate-v3/route.js; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Appliquer la politique nutrition et diversité
        if: steps.state.outputs.needed == 'true'
        run: |
          git apply --check scripts/agent/generate-v3-speed-objectives-diversity.patch
          git apply scripts/agent/generate-v3-speed-objectives-diversity.patch
          node --check app/api/planning/generate-v3/route.js
      - name: Publier la route corrigée
        if: steps.state.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/planning/generate-v3/route.js
          git commit -m "feat(planning): appliquer objectifs et diversité inter-semaines"
          git push origin HEAD:agent/planning-speed-objectives-diversity-modal
