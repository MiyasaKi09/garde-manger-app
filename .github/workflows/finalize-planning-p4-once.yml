name: Finalize planning P4 once

on:
  push:
    branches:
      - claude/planning-p4-support-slots

permissions:
  contents: write

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: stub

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/planning-p4-support-slots
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Harden support slots, link meals and add real preparation tasks
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one match, got {count}: {old[:80]!r}")
              p.write_text(text.replace(old, new, 1))

          # Support legacy meals must reference the actual support slot.
          replace_once(
              'lib/domain/planning/personalizedMeals.js',
              "    slot_key: null,\n    person_name: member.name,",
              "    slot_key: `${date}-${mealType}`,\n    person_name: member.name,",
          )

          payload = Path('lib/domain/planning/canonicalPlanPayload.js')
          text = payload.read_text()
          text = text.replace(
              "  const supportSlots = []\n  const supportReservations = []",
              "  const supportSlots = []\n  const supportReservations = []\n  const supportTasks = []",
              1,
          )
          text = text.replace(
              "    const descriptions = [...new Set(group.meals.map((meal) => meal.description).filter(Boolean))]\n    supportSlots.push({",
              """    const descriptions = [...new Set(group.meals.map((meal) => meal.description).filter(Boolean))]
    const supportServings = round(group.meals.reduce((sum, meal) => sum + (Number(meal.planned_servings) || 1), 0), 2)
    const eggCount = group.meals
      .flatMap((meal) => meal.portion_details?.items || [])
      .filter((item) => item.food === 'eggs')
      .reduce((sum, item) => sum + (Number(item.quantity) || 0), 0)
    supportSlots.push({""",
              1,
          )
          text = text.replace("      servings: 1,", "      servings: supportServings,", 1)
          text = text.replace("        mode: 'assemble',", "        mode: 'support',", 1)
          text = text.replace(
              """      stock_summary: { coverage: null, allocations: slotAllocations, shortages: [], explanations: [], support: true },
    })
  }
  // Créneaux support ajoutés""",
              """      stock_summary: { coverage: null, allocations: slotAllocations, shortages: [], explanations: [], support: true },
    })
    if (eggCount > 0) {
      const prepDate = group.mealType === 'pdj' ? addDays(group.date, -1) : group.date
      const dueHour = group.mealType === 'pdj' ? '20:00:00' : '09:00:00'
      const due = new Date(`${prepDate}T${dueHour}Z`).toISOString()
      supportTasks.push({
        task_key: `support-eggs-${slotKey}`,
        slot_key: slotKey,
        prep_date: prepDate,
        prep_label: 'Préparation support',
        title: `Cuire ${Math.round(eggCount)} œuf${eggCount > 1 ? 's' : ''} dur${eggCount > 1 ? 's' : ''}`,
        task_type: 'prepare_support',
        earliest_start_at: new Date(`${prepDate}T07:00:00Z`).toISOString(),
        due_at: due,
        safety_deadline_at: new Date(`${group.date}T07:00:00Z`).toISOString(),
        duration_min: 12,
        priority: 65,
        instructions: [{
          n: 1,
          instruction: `Cuire ${Math.round(eggCount)} œuf${eggCount > 1 ? 's' : ''}, refroidir rapidement puis conserver au réfrigérateur.`,
        }],
      })
    }
  }
  // Créneaux support ajoutés""",
              1,
          )
          text = text.replace(
              """  })

  // Chaîne congélation (audit P3 item 5)""",
              """  })
  tasks.push(...supportTasks)

  // Chaîne congélation (audit P3 item 5)""",
              1,
          )
          payload.write_text(text)

          migration = Path('supabase/migrations/20260719000001_p4_support_slot_reservations.sql')
          sql = migration.read_text()
          marker = """  IF (p_payload->>'window_start')::date IS NULL
"""
          guard = """  -- Un créneau sans recette n'est autorisé que pour une prise support bornée.
  -- Le garde-fou est volontairement strict : un client ne peut pas étiqueter un
  -- déjeuner arbitraire comme « support » pour contourner le mapping canonique.
  IF EXISTS (
    SELECT 1
    FROM jsonb_array_elements(COALESCE(p_payload->'slots', '[]'::jsonb)) AS support_slot(value)
    WHERE value->>'source' = 'support'
      AND (
        value->>'meal_type' NOT IN ('pdj', 'collation')
        OR NULLIF(value->>'recipe_code', '') IS NOT NULL
        OR NULLIF(value->>'cooked_dish_id', '') IS NOT NULL
        OR value#>>'{preparation,mode}' IS DISTINCT FROM 'support'
      )
  ) THEN
    RAISE EXCEPTION 'support_slot_invalid';
  END IF;

"""
          if marker not in sql or 'support_slot_invalid' in sql:
              raise SystemExit('migration guard insertion point missing or already applied')
          sql = sql.replace(marker, guard + marker, 1)
          sql = sql.replace("AND source <> 'support'", "AND source IS DISTINCT FROM 'support'", 1)
          migration.write_text(sql)

          test = Path('supabase/tests/ci/41_planning_p4.sql')
          sql_test = test.read_text()
          sql_test = sql_test.replace(
              """  IF _def NOT LIKE '%source <> ''support''%' THEN
    RAISE EXCEPTION '[P4] exemption des créneaux support (source=support) absente du garde-fou';
  END IF;
""",
              """  IF _def NOT LIKE '%source IS DISTINCT FROM ''support''%' THEN
    RAISE EXCEPTION '[P4] exemption sûre des créneaux support (source=support) absente du garde-fou';
  END IF;

  IF _def NOT LIKE '%support_slot_invalid%'
     OR _def NOT LIKE '%meal_type%pdj%collation%'
     OR _def NOT LIKE '%preparation,mode%support%' THEN
    RAISE EXCEPTION '[P4] validation stricte des créneaux support absente';
  END IF;
""",
              1,
          )
          test.write_text(sql_test)

          ci = Path('.github/workflows/ci.yml')
          ci_text = ci.read_text()
          ci_text = ci_text.replace('Treize migrations postérieures', 'Quatorze migrations postérieures', 1)
          ci_text = ci_text.replace('[ "$count" -eq 13 ]', '[ "$count" -eq 14 ]', 1)
          ci_text = ci_text.replace('les 13 nouvelles', 'les 14 nouvelles', 1)
          ci_text = ci_text.replace(
              "echo \"$output\" | grep '^apply ' | grep -q '20260717000002'",
              "echo \"$output\" | grep '^apply ' | grep -q '20260717000002'\n          echo \"$output\" | grep '^apply ' | grep -q '20260719000001'",
              1,
          )
          ci_text = ci_text.replace('[B] Apply réel (13 migrations post-snapshot)', '[B] Apply réel (14 migrations post-snapshot)', 1)
          ci_text = ci_text.replace("'^migrations : 13 appliquées'", "'^migrations : 14 appliquées'", 1)
          ci_text = ci_text.replace('[B] Assertions objets — 13 nouvelles migrations installées', '[B] Assertions objets — 14 nouvelles migrations installées', 1)
          ci.write_text(ci_text)

          unit = Path('tests/planning/supportSlotReservations.test.js')
          unit_text = unit.read_text()
          append_marker = unit_text.rfind('\n})')
          if append_marker < 0:
              raise SystemExit('support test suite closing marker missing')
          extra_test = r'''

  it('links support meals, uses a bounded support mode and schedules boiled eggs', () => {
    const payload = buildCanonicalPlanPayload(baseArgs({ inventoryLots: lotsForAllSupplements() }))
    const breakfast = payload.slots.find((slot) => slot.meal_type === 'pdj')
    const breakfastMeals = payload.legacy_meals.filter((meal) => meal.meal_type === 'pdj')
    expect(breakfast).toBeTruthy()
    expect(breakfast.preparation.mode).toBe('support')
    expect(breakfast.servings).toBeGreaterThanOrEqual(1)
    expect(breakfastMeals.every((meal) => meal.slot_key === breakfast.slot_key)).toBe(true)
    expect(payload.tasks.some((task) => task.slot_key === breakfast.slot_key && task.task_type === 'prepare_support')).toBe(true)
  })
'''
          unit.write_text(unit_text[:append_marker] + extra_test + unit_text[append_marker:])

      - name: Regenerate migration manifest
        run: node scripts/db/build-manifest.mjs

      - name: Run unit tests
        run: npx vitest run

      - name: Build application
        run: npm run build

      - name: Commit verified fixes and remove this one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-planning-p4-once.yml
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          git add -A
          git commit -m "fix(planning): sécuriser et rendre exécutables les prises support"
          git push origin HEAD:claude/planning-p4-support-slots
