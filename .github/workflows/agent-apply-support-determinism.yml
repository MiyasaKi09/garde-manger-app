name: Agent apply support determinism

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/planning-speed-objectives-diversity-modal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/planning-speed-objectives-diversity-modal
          fetch-depth: 0
      - name: Vérifier si le correctif est nécessaire
        id: state
        run: |
          if grep -q "let selectedSupport" lib/domain/planning/personalizedMeals.js; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Appliquer le correctif
        if: steps.state.outputs.needed == 'true'
        run: |
          git apply --check scripts/agent/fix-support-determinism.patch
          git apply scripts/agent/fix-support-determinism.patch
          node --check lib/domain/planning/personalizedMeals.js
      - name: Publier le correctif
        if: steps.state.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/domain/planning/personalizedMeals.js
          git commit -m "fix(planning): préserver les supports physiques déterministes"
          git push origin HEAD:agent/planning-speed-objectives-diversity-modal
