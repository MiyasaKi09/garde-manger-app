name: Planning safety

on:
  pull_request:
    paths:
      - 'app/api/planning/**'
      - 'app/api/meals/cook/**'
      - 'app/planning/**'
      - 'app/nutrition/**'
      - 'components/ui/PersonSelector.jsx'
      - 'lib/domain/planning/**'
      - 'lib/nutritionPlanService.js'
      - 'lib/server/legacyMealCookRoute.js'
      - 'tests/planning/**'
      - 'supabase/migrations/**planning*.sql'
      - 'supabase/migrations/**planned*.sql'
      - 'supabase/migrations/includes/**'
      - 'supabase/tests/ci/*planning*.sql'
      - 'supabase/tests/canary/**'
      - 'scripts/db/build-manifest.mjs'
      - 'scripts/db/migration-manifest.json'
      - '.github/workflows/planning-safety.yml'
      - '.github/workflows/release-production.yml'
      - 'scripts/db/verify-planning-production.sql'
  push:
    branches:
      - 'claude/**'
      - 'agent/**'
    paths:
      - 'app/api/planning/**'
      - 'app/api/meals/cook/**'
      - 'app/planning/**'
      - 'app/nutrition/**'
      - 'components/ui/PersonSelector.jsx'
      - 'lib/domain/planning/**'
      - 'lib/nutritionPlanService.js'
      - 'lib/server/legacyMealCookRoute.js'
      - 'tests/planning/**'
      - 'supabase/migrations/**planning*.sql'
      - 'supabase/migrations/**planned*.sql'
      - 'supabase/migrations/includes/**'
      - 'supabase/tests/ci/*planning*.sql'
      - 'supabase/tests/canary/**'
      - 'scripts/db/build-manifest.mjs'
      - 'scripts/db/migration-manifest.json'
      - '.github/workflows/planning-safety.yml'
      - '.github/workflows/release-production.yml'
      - 'scripts/db/verify-planning-production.sql'

permissions:
  contents: read

jobs:
  prepared-source-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Vérifier le planning canonique de bout en bout
        run: npx vitest run tests/planning --reporter=verbose
      - name: Vérifier le manifeste composite des migrations
        run: |
          node scripts/db/build-manifest.mjs
          git diff --exit-code -- scripts/db/migration-manifest.json
